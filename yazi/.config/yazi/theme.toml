## High-contrast theme tuned for SSH sessions.
## Uses ANSI color names (not hex) so colors inherit from the remote terminal's
## palette instead of forcing a truecolor value the SSH terminal may not render.
## Selections use `reversed = true` to guarantee legibility regardless of palette.

[mgr]
cwd = { fg = "cyan", bold = true }

hovered         = { reversed = true, bold = true }
preview_hovered = { underline = true }

find_keyword  = { fg = "yellow", bold = true, italic = true, underline = true }
find_position = { fg = "magenta", bold = true, italic = true }

marker_copied   = { fg = "green",  bg = "green" }
marker_cut      = { fg = "red",    bg = "red" }
marker_marked   = { fg = "blue",   bg = "blue" }
marker_selected = { fg = "yellow", bg = "yellow" }

tab_active   = { reversed = true, bold = true }
tab_inactive = {}
tab_width    = 1

count_copied   = { fg = "white", bg = "green" }
count_cut      = { fg = "white", bg = "red" }
count_selected = { fg = "black", bg = "yellow" }

border_symbol = "│"
border_style  = { fg = "gray" }

syntect_theme = ""

[mode]
normal_main = { fg = "black", bg = "blue",    bold = true }
normal_alt  = { fg = "blue",  bg = "black" }

select_main = { fg = "black", bg = "green",   bold = true }
select_alt  = { fg = "green", bg = "black" }

unset_main  = { fg = "black", bg = "magenta", bold = true }
unset_alt   = { fg = "magenta", bg = "black" }

[status]
separator_open    = ""
separator_close   = ""
separator_style   = { fg = "black", bg = "black" }

progress_label   = { fg = "white", bold = true }
progress_normal  = { fg = "blue",  bg = "black" }
progress_error   = { fg = "red",   bg = "black" }

permissions_t = { fg = "cyan" }
permissions_r = { fg = "yellow" }
permissions_w = { fg = "red" }
permissions_x = { fg = "green" }
permissions_s = { fg = "white" }

[which]
cand           = { fg = "cyan", bold = true }
rest           = { fg = "gray" }
desc           = { fg = "magenta" }
separator      = "  "
separator_style = { fg = "gray" }
mask           = { bg = "black" }

[help]
on      = { fg = "cyan", bold = true }
run     = { fg = "magenta" }
desc    = { fg = "white" }
hovered = { reversed = true, bold = true }
footer  = { fg = "black", bg = "white" }

[notify]
title_info  = { fg = "green",  bold = true }
title_warn  = { fg = "yellow", bold = true }
title_error = { fg = "red",    bold = true }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[confirm]
border  = { fg = "yellow" }
title   = { fg = "yellow", bold = true }
content = {}
list    = {}
btn_yes = { reversed = true, bold = true }
btn_no  = {}
btn_labels = [" [Y]es ", " (N)o "]

[spot]
border = { fg = "yellow" }
title  = { fg = "yellow", bold = true }
tbl_col   = { fg = "cyan", bold = true }
tbl_cell  = { reversed = true }

[input]
border   = { fg = "yellow" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "yellow" }
active   = { fg = "magenta", bold = true }
inactive = {}

[tasks]
border   = { fg = "yellow" }
title    = {}
hovered  = { fg = "magenta", underline = true }

[filetype]

rules = [
  # Images — bright yellow stands out on any background
  { mime = "image/*", fg = "yellow", bold = true },

  # Media
  { mime = "{audio,video}/*", fg = "magenta", bold = true },

  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "red", bold = true },

  # Documents
  { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "cyan" },

  # Executables / code
  { mime = "application/x-{executable,sharedlib}", fg = "green", bold = true },

  # Directories — bold blue, the universal "this is a folder" signal
  { name = "*/", fg = "blue", bold = true },

  # Fallback for everything else uses the default fg (inherits terminal)
  { name = "*", fg = "reset" },
]
