set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -g history-limit 100000
set -g focus-events on
set -g status on
set -g set-clipboard on
# Guarantee tmux forwards OSC 52 clipboard writes out to the real terminal (the
# device I'm sitting at), so a Neovim yank over SSH lands on my local clipboard.
# Defining Ms is what makes the passthrough reliable across terminfo entries.
# %p1%.0s discards whatever selector the inner app picked and hardcodes `c`
# (CLIPBOARD) — terminals accept it, and it stays compatible if mosh is ever in
# the path (mosh-server only relays the `c` selector).
set -ag terminal-overrides ",xterm*:Ms=\\E]52;c%p1%.0s;%p2%s\\7"
set -g extended-keys on
set -g aggressive-resize on
set -g status-left "#S"
set -g status-right ""
set -g status-style "bg=#14532d,fg=#eafff0"

# bg server (tmux -L bg): blue status bar so it's obvious which server this is
%if "#{m:*/bg,#{socket_path}}"
set -g status-style "bg=#0a2f5c,fg=#eaf3ff"
set -g status-left "[bg] #S "
%endif

# macOS Option+D sends ESC d; map it globally to detach-client
bind -n M-d detach-client
bind -n "M-;" detach-client

# Option+A: open session/window picker (show pane title when meaningful, e.g. claude)
bind -n M-a choose-tree -O name -Zs -F "#{session_name} [#{b:pane_current_path}]#{?#{&&:#{!=:#{pane_title},#{session_name}},#{&&:#{!=:#{pane_title},zsh},#{!=:#{pane_title},#{pane_current_command}}}},: #{pane_title},}"

# Option+K: open session picker in "kill mode" — Enter kills the selected session (no confirmation)
bind -n M-k choose-tree -O name -Zs -F "#{session_name} [#{b:pane_current_path}]#{?#{&&:#{!=:#{pane_title},#{session_name}},#{&&:#{!=:#{pane_title},zsh},#{!=:#{pane_title},#{pane_current_command}}}},: #{pane_title},}" "kill-session -t '%%'"

# Option+X: switch to the next priority session (in-progress claude, else next), then kill the old one
bind -n M-x run-shell "zsh -c 'source ~/.config/zsh/tmux.zsh; _t_switch_next_and_kill \"\" \"#S\"'"

# Option+Z: kill the current session and detach back to the terminal (≈ M-x then M-d)
bind -n M-z run-shell 'tmux detach-client -s "#S"; tmux kill-session -t "#S"'

# Option+N: spawn a new claude session in the current pane's directory and switch to it
bind -n M-n run-shell "zsh -c 'source ~/.config/zsh/variables.zsh; source ~/.config/zsh/claude.zsh; _claude_new_here \"#{pane_current_path}\"'"

# Ctrl+Tab: jump to last-used pane
bind -n C-Tab select-pane -l

# Alt+Arrow: navigate between panes. But when the focused pane is running
# vim/nvim, pass Option+Up/Down THROUGH so nvim's own <M-Up>/<M-Down> maps win
# (mine scroll a half page, like C-u/C-d) instead of tmux stealing them for pane
# nav. Left/Right stay pure pane-nav so I can still escape an nvim pane sideways.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up   if-shell -F "#{m/ri:^(view|l?n?vim?x?)(diff)?$,#{pane_current_command}}" "send-keys M-Up"   "select-pane -U"
bind -n M-Down if-shell -F "#{m/ri:^(view|l?n?vim?x?)(diff)?$,#{pane_current_command}}" "send-keys M-Down" "select-pane -D"

# Alt+j/k: cycle to next/previous pane (vim-ish)
# bind -n M-j select-pane -t :.+
# bind -n M-k select-pane -t :.-

# Vim-style y to copy selection to macOS clipboard (stay in copy-mode)
# Let tmux launch the login shell normally on modern macOS
set-option -g default-shell "$SHELL"

bind -T copy-mode-vi y send -X copy-pipe "reattach-to-user-namespace pbcopy"
# Optional: also support Enter like tmux defaults, but to pbcopy
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
