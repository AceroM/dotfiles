set -g history-limit 100000
set -g focus-events on
set -g mouse on
set -g status on
set -g set-clipboard on
set -g extended-keys on
set -g status-left "#S"
set -g status-right ""
set -g status-style "bg=green,fg=white"

# macOS Option+D sends ESC d; map it globally to detach-client
bind -n M-d detach-client
bind -n "M-;" detach-client

# Option+A: open session/window picker (show pane title when meaningful, e.g. claude)
bind -n M-a choose-tree -Zs -F "#{session_name}#{?#{&&:#{!=:#{pane_title},#{session_name}},#{&&:#{!=:#{pane_title},zsh},#{!=:#{pane_title},#{pane_current_command}}}},: #{pane_title},}"

# Option+X: switch to next session first, then kill the old one (so client stays attached)
bind -n M-x run-shell "tmux switch-client -n && tmux kill-session -t '#S'"

# Ctrl+Tab: jump to last-used pane
bind -n C-Tab select-pane -l

# Alt+Arrow: navigate between panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style y to copy selection to macOS clipboard (stay in copy-mode)
# Let tmux launch the login shell normally on modern macOS
set-option -g default-shell "$SHELL"

# Copy to macOS clipboard when mouse selection ends
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

bind -T copy-mode-vi y send -X copy-pipe "reattach-to-user-namespace pbcopy"
# Optional: also support Enter like tmux defaults, but to pbcopy
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
